<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Island IT Hub Portfolio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050a18; /* Original dark blue background */
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .profile-card {
            padding-top: 50px;
        }

        .verified-badge {
            border: 1px solid #007bff;
            color: #007bff;
            padding: 5px 20px;
            border-radius: 20px;
            display: inline-block;
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* Logo ko gol frame mein dikhane ke liye */
        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 3px solid #00d4ff;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        h1 {
            font-size: 36px;
            margin: 10px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .specialist-text {
            color: #00d4ff;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .status-btn {
            background-color: rgba(0, 255, 127, 0.1);
            border: 1px solid #00ff7f;
            color: #00ff7f;
            padding: 10px 25px;
            border-radius: 30px;
            display: inline-block;
            font-size: 14px;
        }

        .footer-stats {
            margin-top: 80px;
            display: flex;
            justify-content: center;
            gap: 50px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
        }

        .stat-item {
            font-size: 14px;
        }

        .stat-item b {
            display: block;
            color: #ffc107;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="verified-badge">✓ Verified Maintenance Partner</div>
        
        <br>

        <img src="island-logo.png" class="profile-img" alt="Island IT Hub">

        <h1>ISLAND IT <br> HUB</h1>
        
        <p class="specialist-text">IT Infrastructure & Security Systems Specialist</p>

        <div class="status-btn">
            ● AMC Service Active | 24/7 Support
        </div>

        <div class="footer-stats">
            <div class="stat-item"><b>100%</b> Reliable</div>
            <div class="stat-item"><b>Fast</b> Response</div>
            <div class="stat-item"><b>Expert</b> Quality</div>
        </div>
    </div>

</body>
</html>
