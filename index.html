<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Island IT Hub | Portfolio</title>
    <style>
        /* CSS - Design aur Layout */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #001f3f 0%, #000814 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 600px;
            width: 90%;
        }

        .badge {
            background: #007bff;
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid #00d4ff;
        }

        /* Logo Styling */
        .logo-box img {
            width: 180px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
        }

        /* Title Styling */
        h1 {
            font-size: 2.8rem;
            margin: 0;
            letter-spacing: 4px;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #00d4ff;
            margin: 10px 0 30px 0;
            font-weight: 400;
        }

        .status-bar {
            background: rgba(0, 255, 127, 0.1);
            color: #00ff7f;
            border: 1px solid #00ff7f;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            display: inline-block;
        }

        .features {
            display: flex;
            justify-content: space-around;
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .feature-item {
            font-size: 13px;
        }

        .feature-item span {
            display: block;
            font-weight: bold;
            color: #00d4ff;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">✓ Verified Maintenance Partner</div>

        <div class="logo-box">
            <img src="island-logo.png" alt="Island IT Hub Logo">
        </div>

        <h1>ISLAND IT HUB</h1>
        <p class="subtitle">IT Infrastructure & Security Systems Specialist</p>

        <div class="status-bar">
            ● AMC Service Active | 24/7 Support
        </div>

        <div class="features">
            <div class="feature-item">
                <span>100%</span> Reliable
            </div>
            <div class="feature-item">
                <span>Fast</span> Response
            </div>
            <div class="feature-item">
                <span>Expert</span> Quality
            </div>
        </div>
    </div>

</body>
</html>
